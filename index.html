<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solo Mining Calculator</title>
  <meta name="description" content="Calculate your probability of solo mining a block for BTC, XMR, or BCH based on your hashrate. Live network stats, block reward, and expected time.">
  <meta property="og:title" content="Solo Mining Calculator">
  <meta property="og:description" content="What are your chances of solo mining a block? Calculate odds for Bitcoin, Monero, and Bitcoin Cash.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://solo.turtlecute.org">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%2310B981'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='white'>&#x26CF;</text></svg>">
  <link rel="dns-prefetch" href="https://mempool.space">
  <link rel="dns-prefetch" href="https://api.blockchair.com">
  <link rel="dns-prefetch" href="https://api.coingecko.com">
  <link rel="preconnect" href="https://mempool.space" crossorigin>
  <link rel="preconnect" href="https://api.blockchair.com" crossorigin>
  <link rel="preconnect" href="https://api.coingecko.com" crossorigin>
  <script defer src="https://umami.priorato.org/priorato" data-website-id="a3f061e6-ad2a-410f-9b1b-f0ae24c0dfc8"></script>
  <style>
:root{--bg:#0D0D0D;--bg-card:#161616;--text:#EFEFEF;--text-muted:#8D8D8D;--accent:#10B981;--border:#262626;--input-bg:#1A1A1A}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
main{max-width:720px;margin:0 auto;padding:2.5rem 1.25rem}
header{text-align:center;margin-bottom:2.5rem}
header h1{font-size:1.5rem;font-weight:700;margin-bottom:.25rem}
.tagline{color:var(--text-muted);font-size:.9rem;margin-bottom:1rem}
.coin-tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.coin-tab{font-family:inherit;font-size:.85rem;font-weight:600;padding:.5rem 1.2rem;background:var(--input-bg);color:var(--text-muted);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:background-color .2s,color .2s,border-color .2s}
.coin-tab:hover{color:var(--text);border-color:var(--text-muted)}
.coin-tab.active{background:var(--accent);color:#0D0D0D;border-color:var(--accent)}
#input-section{margin-bottom:1rem}
#input-section label{display:block;font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.input-group{display:flex;gap:.5rem;margin-bottom:1.5rem}
.input-group input[type="number"]{flex:1;font-size:1.4rem;font-weight:600;font-family:inherit;padding:.6rem .9rem;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:8px;outline:none;min-width:0;transition:border-color .2s}
.input-group input[type="number"]:focus{border-color:var(--accent)}
.input-group input[type="number"]::-webkit-outer-spin-button,.input-group input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.input-group input[type="number"]{-moz-appearance:textfield}
.input-group select{font-size:.95rem;font-family:inherit;padding:.6rem .9rem;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:8px;cursor:pointer;outline:none;transition:border-color .2s}
.input-group select:focus{border-color:var(--accent)}
.primary-result{text-align:center;margin-bottom:2rem;padding-top:1.25rem;border-top:2px solid var(--accent);transition:border-color .3s}
.primary-result .odds{font-size:1.8rem;font-weight:700;color:var(--accent);line-height:1.2;margin-bottom:.2rem}
.primary-result .expected-time{font-size:.9rem;color:var(--text-muted)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;transition:background-color .3s,border-color .3s,transform .2s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card .label{display:block;font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.25rem}
.card .value{display:block;font-size:1.2rem;font-weight:700;color:var(--text);line-height:1.3}
.card .value.accent{color:var(--accent)}
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
section{margin-bottom:2.5rem}
section h2{font-size:.85rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.network-info{margin-bottom:1.5rem}
.net-heading{font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
.net-list{margin:0}
.net-row{display:flex;justify-content:space-between;align-items:baseline;padding:.3rem 0;border-bottom:1px solid var(--border);transition:border-color .3s}
.net-row:last-child{border-bottom:none}
.net-row dt{font-size:.8rem;color:var(--text-muted);font-weight:400}
.net-row dd{font-size:.8rem;color:var(--text);font-weight:600;margin:0}
.net-row.highlight dd{color:var(--accent)}
#refresh-indicator{font-size:.5rem;color:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pulse 2s ease-in-out infinite}
@media(max-width:600px){main{padding:1.5rem 1rem}header h1{font-size:1.3rem}.input-group{flex-direction:column}.input-group select{min-width:unset}.primary-result .odds{font-size:1.4rem}.card .value{font-size:1.05rem}.coin-tab{padding:.45rem .9rem;font-size:.8rem}}
  </style>
</head>
<body>

  <main>

    <header>
      <h1>Solo Mining Calculator</h1>
      <p class="tagline" id="tagline">What are your chances of mining a Bitcoin block?</p>
    </header>

    <nav class="coin-tabs" id="coin-tabs">
      <button class="coin-tab active" data-coin="BTC">BTC</button>
      <button class="coin-tab" data-coin="XMR">XMR</button>
      <button class="coin-tab" data-coin="BCH">BCH</button>
    </nav>

    <section id="input-section">
      <label for="hashrate-input">Your Hashrate</label>
      <div class="input-group">
        <input type="number" id="hashrate-input" value="1" min="0" step="any">
        <select id="unit-select">
          <option value="TH/s">TH/s</option>
          <option value="PH/s">PH/s</option>
          <option value="EH/s">EH/s</option>
        </select>
      </div>
      <div class="primary-result">
        <div class="odds" id="odds-value">--</div>
        <div class="expected-time" id="expected-time">--</div>
      </div>
    </section>

    <section id="probability-section">
      <h2>Chance of Finding a Block</h2>
      <div class="card-grid">
        <div class="card"><span class="label">1 Day</span><span class="value accent" id="prob-1d">--</span></div>
        <div class="card"><span class="label">1 Week</span><span class="value accent" id="prob-1w">--</span></div>
        <div class="card"><span class="label">1 Month</span><span class="value accent" id="prob-1m">--</span></div>
        <div class="card"><span class="label">1 Year</span><span class="value accent" id="prob-1y">--</span></div>
      </div>
    </section>

    <div class="network-info" id="network-section">
      <div class="net-heading">Network <span id="refresh-indicator" class="pulse">&#x25cf;</span></div>
      <dl class="net-list">
        <div class="net-row"><dt>Hashrate</dt><dd id="stat-hashrate">--</dd></div>
        <div class="net-row"><dt>Difficulty</dt><dd id="stat-difficulty">--</dd></div>
        <div class="net-row"><dt>Block Height</dt><dd id="stat-blockheight">--</dd></div>
        <div class="net-row"><dt>Block Reward</dt><dd id="stat-reward">--</dd></div>
        <div class="net-row"><dt id="label-price">BTC Price</dt><dd id="stat-price">--</dd></div>
        <div class="net-row highlight"><dt>Revenue If Found</dt><dd id="stat-revenue">--</dd></div>
      </dl>
    </div>

  </main>

  <noscript><p style="text-align:center;color:#8D8D8D;padding:2rem;">JavaScript is required to run this calculator.</p></noscript>
  <script>
(function(){'use strict';var DAY=86400,WEEK=604800,MONTH=2592000,YEAR=31536000,FETCH_TIMEOUT=12000,CACHE_MAX_AGE=3600000;
var COINS={BTC:{name:'Bitcoin',symbol:'BTC',blockTime:600,units:{'TH/s':1e12,'PH/s':1e15,'EH/s':1e18},defaultUnit:'TH/s',geckoId:'bitcoin',blockchairSlug:'bitcoin',formatNetHash:function(h){return(h/1e18).toFixed(2)+' EH/s'},rewardFn:function(h){if(h===null)return null;var v=Math.floor(h/210000);return v>=64?0:50/Math.pow(2,v)},deriveHashrate:function(d,bt){return d*4294967296/bt}},
XMR:{name:'Monero',symbol:'XMR',blockTime:120,units:{'H/s':1,'KH/s':1e3,'MH/s':1e6,'GH/s':1e9},defaultUnit:'KH/s',geckoId:'monero',blockchairSlug:'monero',formatNetHash:function(h){return(h/1e9).toFixed(2)+' GH/s'},rewardFn:function(){return 0.6},deriveHashrate:function(d,bt){return d/bt}},
BCH:{name:'Bitcoin Cash',symbol:'BCH',blockTime:600,units:{'TH/s':1e12,'PH/s':1e15,'EH/s':1e18},defaultUnit:'TH/s',geckoId:'bitcoin-cash',blockchairSlug:'bitcoin-cash',formatNetHash:function(h){return(h/1e18).toFixed(2)+' EH/s'},rewardFn:function(h){if(h===null)return null;var v=Math.floor(h/210000);return v>=64?0:50/Math.pow(2,v)},deriveHashrate:function(d,bt){return d*4294967296/bt}}};

var state={coin:'',networkHashrate:0,difficulty:0,blockHeight:null,blockReward:null,price:null,hasPrice:false,userHashrate:1,unit:'TH/s'};

function debounce(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms)}}
function fmt(n){if(!isFinite(n))return'N/A';var r=Math.round(n),s=r<1e20?String(r):r.toFixed(0),o='';for(var i=s.length-1,c=0;i>=0;i--,c++){if(c>0&&c%3===0)o='\u2005'+o;o=s[i]+o}return o}
function coinConf(){return COINS[state.coin]}
function userHs(){var c=coinConf();return state.userHashrate*(c.units[state.unit]||1)}
function isFiniteNum(n){return typeof n==='number'&&isFinite(n)}
function share(){return state.networkHashrate>0?userHs()/state.networkHashrate:0}
function probability(sec){var c=coinConf();return(sec/c.blockTime)*share()}
function getReward(){if(state.blockReward!==null)return state.blockReward;var c=coinConf();if(c.rewardFn)return c.rewardFn(state.blockHeight);return null}
function formatProb(p){if(p<=0)return'0%';if(p>=.9999)return'> 99.99%';var pct=p*100;if(pct>=1)return pct.toFixed(2)+'%';if(pct>=.01)return pct.toFixed(4)+'%';return'1 in '+fmt(1/p)}
function formatTime(sec){if(!isFinite(sec)||sec<=0)return'Never';var tiers=[{l:'year',v:YEAR},{l:'month',v:MONTH},{l:'week',v:WEEK},{l:'day',v:DAY},{l:'hour',v:3600},{l:'minute',v:60}],parts=[],rem=sec;for(var i=0;i<tiers.length&&parts.length<2;i++){if(rem>=tiers[i].v){var n=Math.floor(rem/tiers[i].v);rem%=tiers[i].v;parts.push(n+' '+tiers[i].l+(n!==1?'s':''))}}return parts.length>0?parts.join(', '):'< 1 minute'}
function formatDiff(d){if(d>=1e15)return(d/1e15).toFixed(2)+' P';if(d>=1e12)return(d/1e12).toFixed(2)+' T';if(d>=1e9)return(d/1e9).toFixed(2)+' G';if(d>=1e6)return(d/1e6).toFixed(2)+' M';return fmt(d)}
function $(id){return document.getElementById(id)}
function set(id,txt){var el=$(id);if(el)el.textContent=txt}

function render(){var conf=coinConf();if(!conf)return;var s=share();
set('label-price',conf.symbol+' Price');set('tagline','What are your chances of mining a '+conf.name+' block?');
if(s===0||state.networkHashrate===0){set('odds-value','Waiting for network data\u2026');set('expected-time','');['prob-1d','prob-1w','prob-1m','prob-1y'].forEach(function(id){set(id,'--')});set('stat-hashrate',state.networkHashrate>0?conf.formatNetHash(state.networkHashrate):'--');set('stat-difficulty',state.difficulty>0?formatDiff(state.difficulty):'--');set('stat-blockheight',state.blockHeight!==null?fmt(state.blockHeight):'--');var rw=getReward();set('stat-reward',rw!==null?rw+' '+conf.symbol:'--');set('stat-price',state.hasPrice?'$'+fmt(state.price):'--');set('stat-revenue','--');return}
set('odds-value','1 in '+fmt(1/s));set('expected-time',formatTime(conf.blockTime/s));
set('prob-1d',formatProb(probability(DAY)));set('prob-1w',formatProb(probability(WEEK)));set('prob-1m',formatProb(probability(MONTH)));set('prob-1y',formatProb(probability(YEAR)));
var reward=getReward();set('stat-hashrate',conf.formatNetHash(state.networkHashrate));set('stat-difficulty',formatDiff(state.difficulty));set('stat-blockheight',state.blockHeight!==null?fmt(state.blockHeight):'N/A');set('stat-reward',reward!==null?reward+' '+conf.symbol:'N/A');set('stat-price',state.hasPrice?'$'+fmt(state.price):'N/A');set('stat-revenue',(reward!==null&&state.hasPrice)?'$'+fmt(reward*state.price):'N/A')}

function showPulse(on){var el=$('refresh-indicator');if(el)el.style.display=on?'':'none'}

function fetchWithTimeout(url,ms){var c=new AbortController(),t=setTimeout(function(){c.abort()},ms||FETCH_TIMEOUT);return fetch(url,{signal:c.signal}).then(function(r){clearTimeout(t);if(!r.ok)throw new Error('http-'+r.status);return r},function(e){clearTimeout(t);throw e})}
function fetchJson(url){return fetchWithTimeout(url).then(function(r){return r.json()})}
function fetchText(url){return fetchWithTimeout(url).then(function(r){return r.text()})}
function tryInOrder(fns){var i=0;function next(){if(i>=fns.length)return Promise.resolve(false);var fn=fns[i++];return fn().then(function(){return true},function(){return next()})}return next()}

function cacheNetworkState(){try{localStorage.setItem('sm_net_'+state.coin,JSON.stringify({networkHashrate:state.networkHashrate,difficulty:state.difficulty,blockHeight:state.blockHeight,blockReward:state.blockReward,price:state.price,ts:Date.now()}))}catch(e){}}
function loadCachedNetworkState(coin){try{var raw=localStorage.getItem('sm_net_'+coin);if(!raw)return;var d=JSON.parse(raw);if(Date.now()-d.ts>CACHE_MAX_AGE)return;if(isFiniteNum(d.networkHashrate)&&d.networkHashrate>0)state.networkHashrate=d.networkHashrate;if(isFiniteNum(d.difficulty)&&d.difficulty>0)state.difficulty=d.difficulty;if(isFiniteNum(d.blockHeight))state.blockHeight=d.blockHeight;if(isFiniteNum(d.blockReward))state.blockReward=d.blockReward;if(isFiniteNum(d.price)&&d.price>0){state.price=d.price;state.hasPrice=true}}catch(e){}}

function applyBlockchair(data){if(!data||!data.data)throw new Error('bad blockchair');var d=data.data,conf=coinConf(),got=false;if(isFiniteNum(d.difficulty)&&d.difficulty>0)state.difficulty=d.difficulty;if(d.hashrate_24h){var hr=parseFloat(d.hashrate_24h);if(isFiniteNum(hr)&&hr>0){state.networkHashrate=hr;got=true}}if(!got&&state.difficulty>0&&conf.deriveHashrate){state.networkHashrate=conf.deriveHashrate(state.difficulty,conf.blockTime);got=true}if(isFiniteNum(d.best_block_height))state.blockHeight=d.best_block_height;if(isFiniteNum(d.reward_per_block))state.blockReward=d.reward_per_block;if(isFiniteNum(d.market_price_usd)&&d.market_price_usd>0){var ck='cached_'+state.coin+'_price';if(!state.hasPrice){state.price=d.market_price_usd;state.hasPrice=true}try{localStorage.setItem(ck,String(d.market_price_usd))}catch(e){}}if(!got)throw new Error('no hashrate from blockchair')}
function fetchBlockchair(slug){return fetchJson('https://api.blockchair.com/'+slug+'/stats').then(applyBlockchair)}

function fetchBTC_mempool(){return Promise.allSettled([fetchJson('https://mempool.space/api/v1/mining/hashrate/1m'),fetchText('https://mempool.space/api/blocks/tip/height')]).then(function(res){var got=false;if(res[0].status==='fulfilled'){var v=res[0].value;if(isFiniteNum(v.currentHashrate)&&v.currentHashrate>0){state.networkHashrate=v.currentHashrate;got=true}if(isFiniteNum(v.currentDifficulty))state.difficulty=v.currentDifficulty}if(res[1].status==='fulfilled'){var h=parseInt(res[1].value,10);if(isFiniteNum(h)&&h>=0)state.blockHeight=h}if(!got)throw new Error('no BTC data from mempool')})}
function fetchNetworkBTC(){return tryInOrder([fetchBTC_mempool,function(){return fetchBlockchair('bitcoin')}])}
function fetchNetworkXMR(){return tryInOrder([function(){return fetchBlockchair('monero')}])}
function fetchNetworkBCH(){return tryInOrder([function(){return fetchBlockchair('bitcoin-cash')}])}
var NETWORK_FNS={BTC:fetchNetworkBTC,XMR:fetchNetworkXMR,BCH:fetchNetworkBCH};

function fetchPrice(){var conf=coinConf();if(!conf)return Promise.resolve();var ck='cached_'+state.coin+'_price';if(state.hasPrice)return Promise.resolve();function ap(p){state.price=p;state.hasPrice=true;try{localStorage.setItem(ck,String(p))}catch(e){}}return fetchJson('https://api.coingecko.com/api/v3/simple/price?ids='+conf.geckoId+'&vs_currencies=usd').then(function(data){var p=data&&data[conf.geckoId]&&data[conf.geckoId].usd;if(isFiniteNum(p)&&p>0){ap(p);return}throw new Error('no gecko price')}).catch(function(){try{var c=parseFloat(localStorage.getItem(ck));if(isFiniteNum(c)&&c>0){state.price=c;state.hasPrice=true}}catch(e){}})}

function fetchData(){showPulse(true);var fn=NETWORK_FNS[state.coin]||function(){return Promise.resolve()};return fn().then(function(){return fetchPrice()}).then(function(){cacheNetworkState();showPulse(false)},function(){cacheNetworkState();showPulse(false)})}

function save(){try{localStorage.setItem('sm_hashrate_'+state.coin,String(state.userHashrate));localStorage.setItem('sm_unit_'+state.coin,state.unit);localStorage.setItem('sm_coin',state.coin)}catch(e){}}

function switchCoin(coin){if(!COINS[coin]||coin===state.coin)return;state.coin=coin;state.networkHashrate=0;state.difficulty=0;state.blockHeight=null;state.blockReward=null;state.price=null;state.hasPrice=false;var conf=COINS[coin];try{var h=localStorage.getItem('sm_hashrate_'+coin);state.userHashrate=h?(parseFloat(h)||1):1;var u=localStorage.getItem('sm_unit_'+coin);state.unit=(u&&conf.units[u])?u:conf.defaultUnit}catch(e){state.userHashrate=1;state.unit=conf.defaultUnit}loadCachedNetworkState(coin);var input=$('hashrate-input'),select=$('unit-select');if(input)input.value=state.userHashrate;if(select){select.innerHTML='';var units=Object.keys(conf.units);for(var i=0;i<units.length;i++){var opt=document.createElement('option');opt.value=units[i];opt.textContent=units[i];select.appendChild(opt)}select.value=state.unit}document.querySelectorAll('.coin-tab').forEach(function(t){t.classList.toggle('active',t.dataset.coin===coin)});save();render();fetchData().then(render)}

function init(){var savedCoin='BTC';try{savedCoin=localStorage.getItem('sm_coin')||'BTC'}catch(e){}if(!COINS[savedCoin])savedCoin='BTC';var input=$('hashrate-input'),select=$('unit-select');var update=debounce(function(){var v=parseFloat(input.value);if(v>0&&isFinite(v)){state.userHashrate=v;save();render()}},300);if(input)input.addEventListener('input',update);if(select)select.addEventListener('change',function(){state.unit=select.value;save();render()});document.querySelectorAll('.coin-tab').forEach(function(t){t.addEventListener('click',function(){switchCoin(t.dataset.coin)})});switchCoin(savedCoin);setInterval(function(){fetchData().then(render)},300000)}
document.addEventListener('DOMContentLoaded',init)})();
  </script>
</body>
</html>
